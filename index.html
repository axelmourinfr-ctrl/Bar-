<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Fourmis Bougent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍺 Les Fourmis Bougent</h1>

<div class="categories">
  <button onclick="setCategory('softs')">Softs</button>
  <button onclick="setCategory('apero')">Apéro</button>
  <button onclick="setCategory('bieres')">Bières</button>
  <button onclick="setCategory('vins')">Vins</button>
  <button onclick="setCategory('snacks')">Snacks</button>
</div>

<div id="items"></div>

<div class="cart">
  <h3 id="total">Total: 0€</h3>
  <div id="cart"></div>

  <button onclick="pay()">💰 Encaisser</button>
  <button onclick="showStats()">📊 Stats</button>
</div>

<!-- STATS -->
<div id="statsBox" class="modal">
  <div class="modal-content">
    <button onclick="closeStats()">❌</button>
    <div id="statsContent"></div>

    <div class="bottom-actions">
      <button onclick="copyStats()">📋 Copier</button>
      <button onclick="exportStats()">📤 Export</button>
      <button onclick="resetStats()">🔄 Reset</button>
    </div>
  </div>
</div>

<!-- PAIEMENT -->
<div id="paymentBox" class="modal">
  <div class="modal-content">
    <button onclick="choosePayment('cash')">💵 Liquide</button>
    <button onclick="choosePayment('card')">💳 Carte</button>
  </div>
</div>

<div id="cashBox" class="modal">
  <div class="modal-content">
    <p>Total: <span id="amountDue"></span>€</p>
    <input id="cashInput" type="number">
    <button onclick="validateCash()">Valider</button>
  </div>
</div>

<script src="storage.js"></script>
<script src="stats.js"></script>
<script src="ticket.js"></script>
<script src="payment.js"></script>
<script src="app.js"></script>

</body>
</html>
